name: phase10-ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      canary_percentage:
        description: Canary traffic percentage
        required: true
        default: "10"
      run_deploy:
        description: Run deploy stages
        required: true
        default: false
        type: boolean

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit and integration tests
        run: npx jest --config jest.config.js --runInBand

  security:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - quality
      - security
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f infra/docker/Dockerfile.api -t finance-api:${{ github.sha }} .

  canary-deploy:
    if: github.event_name == 'workflow_dispatch' && inputs.run_deploy == true
    runs-on: ubuntu-latest
    needs:
      - docker-build
    environment: ${{ inputs.deploy_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy canary
        shell: bash
        run: |
          set -euo pipefail
          echo "Starting canary deployment"
          echo "Environment: ${{ inputs.deploy_environment }}"
          echo "Canary percentage: ${{ inputs.canary_percentage }}%"
          if [ -n "${CANARY_DEPLOY_CMD:-}" ]; then
            eval "$CANARY_DEPLOY_CMD"
          else
            echo "CANARY_DEPLOY_CMD is not set; skipping external deploy command"
          fi

      - name: Verify canary health
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CANARY_HEALTHCHECK_URL:-}" ]; then
            echo "CANARY_HEALTHCHECK_URL is not set; skipping health check"
            echo "failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if curl --silent --show-error --fail --max-time 10 "$CANARY_HEALTHCHECK_URL" >/dev/null; then
            echo "Canary health check passed"
            echo "failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Canary health check failed"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Rollback on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          echo "Canary verification failed. Triggering rollback."
          if [ -n "${ROLLBACK_CMD:-}" ]; then
            eval "$ROLLBACK_CMD"
          else
            echo "ROLLBACK_CMD is not set; manual rollback is required"
          fi
