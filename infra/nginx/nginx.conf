worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    include       /etc/nginx/waf.rules.conf;

    # ─── Logging ────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ─── Performance ────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json application/javascript text/css;

    # ─── Upstream: API Instances ─────────────────────────────
    upstream finance_api {
        least_conn;

        server api:3000 weight=1 max_fails=3 fail_timeout=30s;
        # Add more instances for horizontal scaling:
        # server api_2:3000 weight=1 max_fails=3 fail_timeout=30s;
        # server api_3:3000 weight=1 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    # ─── Rate Limiting ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # ─── Server ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        if ($waf_block_request = 1) {
            return 403;
        }

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Health check (no rate limit)
        location /health {
            proxy_pass http://finance_api;
            proxy_set_header Host $host;
            access_log off;
        }

        # Auth endpoints (strict rate limit)
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://finance_api;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # All other API routes
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;
            limit_req_status 429;

            proxy_pass http://finance_api;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # 404 fallback
        location / {
            return 404 '{"success":false,"error":"Not found"}';
            add_header Content-Type application/json;
        }
    }
}
