# ---------------------------------------------------------------------------
# Basic WAF-style edge filtering for Phase 10.
# This is a lightweight baseline and should be replaced/augmented by managed WAF
# in production (AWS WAF, Cloudflare WAF, ModSecurity, etc.).
# ---------------------------------------------------------------------------

map $query_string $waf_block_query {
    default 0;
    ~*(?:union(?:\+|\s)+select|sleep\(|benchmark\(|<script|%3Cscript|\b(or|and)\b\s+\d+=\d+) 1;
}

map $request_uri $waf_block_uri {
    default 0;
    ~*(?:\.\./|%2e%2e|<|%3c|%00|/etc/passwd|/proc/self) 1;
}

map $http_user_agent $waf_block_ua {
    default 0;
    ~*(?:sqlmap|nikto|acunetix|nmap|masscan|dirbuster) 1;
}

map "$waf_block_query$waf_block_uri$waf_block_ua" $waf_block_request {
    default 0;
    ~*1 1;
}
