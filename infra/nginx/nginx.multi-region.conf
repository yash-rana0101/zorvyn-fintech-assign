worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    include /etc/nginx/waf.rules.conf;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time region=$upstream_region';

    access_log /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json application/javascript text/css;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # Request affinity hint: clients can pass x-region, otherwise default to ap.
    map $http_x_region $region_selector {
        default ap;
        ~*^ap ap;
        ~*^eu eu;
        ~*^us us;
    }

    map $region_selector $regional_upstream {
        default finance_api_ap;
        ap      finance_api_ap;
        eu      finance_api_eu;
        us      finance_api_us;
    }

    map $region_selector $upstream_region {
        default ap-south-1;
        ap      ap-south-1;
        eu      eu-west-1;
        us      us-east-1;
    }

    upstream finance_api_ap {
        least_conn;
        server api-ap:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream finance_api_eu {
        least_conn;
        server api-eu:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream finance_api_us {
        least_conn;
        server api-us:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        if ($waf_block_request = 1) {
            return 403;
        }

        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Global-Region $upstream_region always;

        location /health {
            proxy_pass http://$regional_upstream;
            proxy_set_header Host $host;
            access_log off;
        }

        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://$regional_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Region $upstream_region;
            proxy_read_timeout 30s;
        }

        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;
            limit_req_status 429;

            proxy_pass http://$regional_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Region $upstream_region;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        location / {
            return 404 '{"success":false,"error":"Not found"}';
            add_header Content-Type application/json;
        }
    }
}
