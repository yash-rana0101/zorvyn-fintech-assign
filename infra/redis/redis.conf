# Redis configuration — development defaults
# For production, tune these based on load

# ─── Network ──────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no

# ─── Memory ───────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ─── Persistence ──────────────────────────────────────────
# RDB snapshots
save 900 1
save 300 10
save 60 10000

# AOF for durability (optional in dev, recommended in prod)
appendonly no
appendfsync everysec

# ─── Performance ──────────────────────────────────────────
tcp-keepalive 300
timeout 0
tcp-backlog 511

# ─── Security (set a password in production) ──────────────
# requirepass your-redis-password

# ─── Logging ──────────────────────────────────────────────
loglevel notice
